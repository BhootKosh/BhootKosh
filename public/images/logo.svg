<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="BhootKosh ghost logo">
  <!-- cream canvas -->
  <rect width="128" height="128" fill="#f2e6d0"/>
  <!-- hard neo-brutal shadow -->
  <rect x="18" y="18" width="100" height="100" fill="#0a0a0a"/>
  <!-- saffron tile -->
  <rect x="10" y="10" width="100" height="100" fill="#e85d04" stroke="#0a0a0a" stroke-width="6"/>

  <!--
    Classic Halloween sheet ghost (emoji silhouette):
    - dome head
    - tall white body
    - 4 soft wavy scallops at the bottom (sheet hem)
    No legs, no antennae, no gold disc — only a ghost.
  -->
  <path
    fill="#fffdf8"
    stroke="#0a0a0a"
    stroke-width="5.5"
    stroke-linejoin="round"
    stroke-linecap="round"
    d="
      M 60 20
      C 38 20 26 38 26 56
      L 26 96
      Q 26 102 32 100
      Q 38 92 44 100
      Q 50 108 56 100
      Q 62 92 68 100
      Q 74 108 80 100
      Q 86 92 92 100
      Q 96 104 98 100
      L 98 56
      C 98 38 82 20 60 20
      Z
    "
  />

  <!-- oversized cartoon eyes -->
  <ellipse cx="46" cy="52" rx="8" ry="10" fill="#0a0a0a"/>
  <ellipse cx="74" cy="52" rx="8" ry="10" fill="#0a0a0a"/>
  <circle cx="43" cy="48" r="2.5" fill="#fffdf8"/>
  <circle cx="71" cy="48" r="2.5" fill="#fffdf8"/>
</svg>
