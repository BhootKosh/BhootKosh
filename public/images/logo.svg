<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="BhootKosh ghost logo">
  <!-- cream base -->
  <rect width="128" height="128" fill="#f2e6d0"/>
  <!-- hard shadow -->
  <rect x="18" y="18" width="100" height="100" fill="#0a0a0a"/>
  <!-- saffron frame -->
  <rect x="10" y="10" width="100" height="100" fill="#e85d04" stroke="#0a0a0a" stroke-width="6"/>
  <!-- gold badge behind ghost -->
  <circle cx="60" cy="58" r="34" fill="#f4c430" stroke="#0a0a0a" stroke-width="4"/>
  <!-- classic sheet ghost -->
  <path
    d="M40 48
       C40 32 48 24 60 24
       C72 24 80 32 80 48
       L80 86
       C80 86 76 80 72 86
       C68 92 64 84 60 90
       C56 84 52 92 48 86
       C44 80 40 86 40 86
       Z"
    fill="#fffdf8"
    stroke="#0a0a0a"
    stroke-width="4"
    stroke-linejoin="round"
  />
  <!-- eyes -->
  <ellipse cx="52" cy="50" rx="5" ry="6.5" fill="#0a0a0a"/>
  <ellipse cx="68" cy="50" rx="5" ry="6.5" fill="#0a0a0a"/>
  <!-- tiny eye shine -->
  <circle cx="50.5" cy="48" r="1.6" fill="#fffdf8"/>
  <circle cx="66.5" cy="48" r="1.6" fill="#fffdf8"/>
  <!-- soft mouth -->
  <path d="M54 62 Q60 68 66 62" fill="none" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round"/>
</svg>
